query_classifier_schema:
  type: object
  properties:
    query_type:
      type: string
      enum:
        - standalone
        - follow_up
  required:
    - query_type
  additionalProperties: false

verifier_schema:
  type: object
  properties:
    is_complete:
      type: boolean
    answered_requirements:
      type: array
      items:
        type: string
    missing_requirements:
      type: array
      items:
        type: string
    execution_errors:
      type: array
      items:
        type: string
    next_recommended_step:
      type: string
    reason:
      type: string
  required:
    - is_complete
    - answered_requirements
    - missing_requirements
    - execution_errors
    - next_recommended_step
    - reason
  additionalProperties: false


task_analyzer_schema:
  type: object
  properties:
    primary_task:
      type: string
      enum:
        - eda
        - visualization
        - classification
        - regression
        - clustering
        - data_cleaning
        - statistical_analysis
        - unknown

    secondary_tasks:
      type: array
      items:
        type: string
        enum:
          - eda
          - visualization
          - classification
          - regression
          - clustering
          - data_cleaning
          - statistical_analysis
          - unknown

    requires_machine_learning:
      type: boolean

    ml_problem_type:
      type: string
      enum:
        - classification
        - regression
        - clustering
        - none
        - unknown

    target_column:
      type:
        - string
        - "null"

    requested_outputs:
      type: array
      items:
        type: string

    planning_hints:
      type: array
      items:
        type: string

    reason:
      type: string

  required:
    - primary_task
    - secondary_tasks
    - requires_machine_learning
    - ml_problem_type
    - target_column
    - requested_outputs
    - planning_hints
    - reason

  additionalProperties: false


contextualizer_schema:
  type: object
  properties:
    standalone_question:
      type: string
    used_history:
      type: boolean
    reason:
      type: string

  required:
    - standalone_question
    - used_history
    - reason

  additionalProperties: false


query_classifier: |
  You are a conversation continuity classifier.

  Your task is to determine whether the user's question should continue an existing conversation
  or start a new conversation.

  Definitions:

  - standalone:
    The question can start a new conversation thread.
    It does not require previous messages, previous code, previous outputs,
    previous analysis, or previous discussion.

  - follow_up:
    The question refers to, depends on, or is a continuation of previous conversation context.

  Important rules:

  - A question is NOT follow_up simply because it requires a dataset, file, image, or other input.
  - Missing information does NOT imply follow_up.
  -- Missing conversational reference caused by pronouns like "it", "its", "this", or "that" DOES imply follow_up.
  - Only classify as follow_up when previous conversation context would be useful or necessary.
  -- If the question contains pronouns or vague references such as "it", "its", "this", "that", "these", "those", classify it as "follow_up", unless the referenced object is explicitly named in the question.

  Common follow_up indicators:
  - continue
  - previous
  - above
  - earlier
  - same dataset
  - same code
  - compare with before
  - now
  - again
  - this
  - that
  - these results
  - this plot
  - fix it
  - improve it
  - what about this

  Examples:

  User: "Analyze this dataset"
  -> standalone

  User: "Find the target variable"
  -> standalone

  User: "Create a random forest model"
  -> standalone

  User: "Continue the analysis"
  -> follow_up

  User: "Compare with the previous results"
  -> follow_up

  User: "Is this correct?"
  -> follow_up

  User: "Now try XGBoost"
  -> follow_up

  User: "What is its distribution?"
  -> follow_up

  User: "Show its distribution"
  -> follow_up

  User: "Is it balanced?"
  -> follow_up

  User: "What about that?"
  -> follow_up

  User question:
  {question}

  Return only valid JSON:

  {{
    "query_type": "standalone | follow_up"
  }}




contextualizer: |
  You are a query contextualization agent.

  Your task is to rewrite a follow-up user question into a complete standalone question using the provided history.

  Previous conversation history:
  {history}

  Current user question:
  {question}

  Return only valid JSON:

  {{
    "standalone_question": "complete standalone question",
    "used_history": true,
    "reason": "short explanation"
  }}

  Rules:
  - Do not answer the question.
  - Only rewrite the question.
  - Preserve the user's original intent.
  - If the question is already standalone, return it unchanged.
  - Return JSON only.



analyzer: |
  You are an expert data analysist.
  Generate a Python code that loads and describes the content of {filename}.
  # Requirement
  The file can both unstructured or structured data.
  If there are too many structured data, print out just few examples.
  Print out essential informations. For example, print out all the column names.
  The Python code should print out the content of {filename}.
  The code should be a single-file Python program that is self-contained and can be
  executed as-is.
  Your response should only contain a single code block.
  Important: You should not include dummy contents since we will debug if error occurs.
  Do not use try: and except: to prevent error. I will debug it later.


task_analyzer: |
  You are an expert data analysis task classifier.

  Your job is to analyze the user's question and the available dataset summary.
  Do not write code.
  Do not create a step-by-step plan.
  Instead, identify what kinds of tasks are required.

  # Question
  {question}

  # Given data
  {summaries}

  Return JSON only with exactly this schema:

  {{
    "primary_task": "eda | visualization | classification | regression | clustering | data_cleaning | statistical_analysis | unknown",
    "secondary_tasks": ["list of additional task types"],
    "requires_machine_learning": true,
    "ml_problem_type": "classification | regression | clustering | none | unknown",
    "target_column": "column name if clearly identifiable, otherwise null",
    "requested_outputs": ["what the final answer should contain"],
    "planning_hints": ["short useful hints for the planner"],
    "reason": "short explanation"
  }}

  Rules:
  - A question may contain multiple tasks.
  - Do not force the question into only one task.
  - If something is uncertain, use "unknown" or null.
  - Return valid JSON only.
  - Do not include markdown.


planner_init: |
  You are an expert data analysist.
  In order to answer factoid questions based on the given data, you have to first plan
  effectively.
  # Question
  {question}
  # Given data:
  {summaries}

  # Task analysis
  {task_analysis}


  #Your task
  Suggest your very first step to answer the question above.
  Your first step does not need to be sufficient to answer the question.
  Just propose a very simple initial step, which can act as a good starting point to
  answer the question.
  Your response should only contain an initial step.
planner_next: |
  You are an expert data analyst.
  Your task is to suggest the next plan step needed to answer the question.

  # Question
  {question}

  # Given data
  {summaries}

  # Current plans
  {plan}

  # Current step
  {current_step}

  # Obtained results from the current plans
  {result}

  # Verifier feedback
  {verifier_feedback}


  # Task analysis
  {task_analysis}


  # Your task
  Use the verifier feedback to determine the next missing requirement.
  Suggest one concrete next step only.
  Your response should only contain the next step without any explanation.
coder_init: |
  # Given data:
  {summaries}
  # Plan
  {plan}
  #Your task
  Implement the plan with the given data.
  Your response should be a single markdown Python code (wrapped in).
  There should be no additional headings or text in your response.
coder_next: |
  You are an expert data analysist.
  Your task is to implement the next plan with the given data.
  # Given data:
  {summaries}
  # Base code
  python
  {base_code}

  # Previous plans
  {plan}
  # Current plan to implement
  {current_plan}
  #Your task
  Implement the current plan with the given data.
  The implementation should be done based on the base code.
  The base code is an implementation of the previous plans.
  Your response should be a single markdown Python code (wrapped in).
  There should be no additional headings or text in your response.
verifier: |
  You are an expert data analysist.
  Your task is to check whether the current plan and its code implementation is enough to
  answer the question.
  # Question
  {question}
  # Given data:
  {summaries}
  # Plan
  {plan}
  # Current step
  {current_step}
  # Code
  python
  {code}

  # Execution result of code
  {result}
  # Your task
  Evaluate whether the current results fully answer the user's question.

  Return JSON only, with exactly this schema:

  {{
    "is_complete": true,
    "answered_requirements": ["requirement already answered"],
    "missing_requirements": ["requirement still missing"],
    "execution_errors": ["error messages if any, otherwise empty list"],
    "next_recommended_step": "one concrete next step, or STOP if complete",
    "reason": "short explanation"
  }}

  Rules:
  - Use true or false for is_complete.
  - If the answer is complete, set next_recommended_step to "STOP".
  - Do not include markdown.
  - Do not include any text outside the JSON.
router: |
  You are an expert data analysist.
  Since current plan is insufficient to answer the question, your task is to decide how to
  refine the plan to answer the question.
  # Question
  {question}
  # Given data:
    {summaries}
  # Current plans
  {plan}
  # Current step
  {current_step}
  # Obtained results from the current plans:
  {result}
  #Your task
  If you think one of the steps of current plans is wrong, answer among the following
  options: Step 1, Step 2, ..., Step K.
  If you think we should perform new NEXT step, answer as 'Add Step'.
  Your response should only be Step 1 ... Step K or Add Step.
debugger: |
  # Given data: (filenames)
  {summaries}
  # Code with an error:
  python
  {code}

  # Error:
  {bug}
  #Your task
  Please revise the code to fix the error.
  Provide the improved, self-contained Python script again.
  Note that you only have {filenames} available.
  There should be no additional headings or text in your response.
  Do not include dummy contents since we will debug if error occurs.
finalyzer: |
  You are an expert data analysist.
  You will answer factoid question by loading and referencing the files/documents listed
  below.
  You also have a reference code.
  Your task is to make solution code to print out the answer of the question following the
  given guideline.
  # Given data:
  (summaries)
  # Reference code
  python
  {code}

  # Execution result of reference code
  {result}
  #Question
  {question}
  #Guidelines
  {guidelines}
  #Your task
  Modify the solution code to print out answer to follow the give guidelines.
  If the answer can be obtained from the execution result of the reference code, just
  generate a Python code that prints out the desired answer.
  The code should be a single-file Python program that is self-contained and can be
  executed as-is.
  Your response should only contain a single code block.
  Do not use try: and except: to prevent error. I will debug it later.